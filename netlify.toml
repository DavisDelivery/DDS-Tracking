[build]
  publish = "public"
  functions = "netlify/functions"

# Friendly /api/* alias for the serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Clean URLs for the review + admin pages (rewrite, so the address bar stays clean)
[[redirects]]
  from = "/review"
  to = "/review.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Keep the internal admin dashboard out of search engines
[[headers]]
  for = "/admin*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
