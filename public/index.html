<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f8f9fb;color:#1f2937;min-height:100vh}
@media print{
  @page{size:letter;margin:0.4in}
  html,body{background:#fff!important;font-size:10px}
  .np,.np *{display:none!important}
  .cd{break-inside:avoid;page-break-inside:avoid;border:1px solid #ccc!important;box-shadow:none!important;margin-bottom:8px!important}
  .gd{display:grid!important;grid-template-columns:1fr 1fr!important;gap:8px!important;margin-top:8px!important}
  .sh{padding:4px 10px!important;font-size:9px!important}
  h1,h2,h3{font-size:14px!important}
  img{max-width:100%!important}
  /* Compress everything */
  [style*="padding:18px 22px"]{padding:8px 12px!important}
  [style*="padding:14px 20px"]{padding:8px 12px!important}
  [style*="padding:10px 16px"]{padding:6px 10px!important}
  [style*="padding:9px 20px"]{padding:4px 10px!important}
  [style*="padding:8px 2px"]{padding:4px 2px!important}
  [style*="padding:12px 14px"]{padding:6px 10px!important}
  /* Shrink map */
  [style*="height:200px"]{height:120px!important}
  /* Shrink photo */
  [style*="aspect-ratio:16/10"]{aspect-ratio:4/3!important;max-height:140px!important}
  /* Hide review card and action buttons on print */
  #review-card{display:none!important}
  /* Tight line items */
  [style*="font-size:13px"][style*="font-weight:600"]{font-size:10px!important}
  [style*="font-size:11px"][style*="color:rgb(151, 163, 179)"]{font-size:9px!important}
  [style*="font-size:12px"]{font-size:9px!important}
  /* Smaller big numbers */
  [style*="font-size:22px"]{font-size:16px!important}
  [style*="font-size:20px"]{font-size:14px!important}
  [style*="font-size:18px"]{font-size:12px!important}
  [style*="font-size:21px"]{font-size:15px!important}
  [style*="font-size:17px"]{font-size:12px!important}
}
@media(max-width:740px){.gd{grid-template-columns:1fr!important}.fd{flex-direction:column!important}.logo-h{height:55px!important}}
input:focus{outline:none;box-shadow:0 0 0 3px rgba(30,91,146,.2)}
.hov{transition:all .15s}.hov:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.cd{background:#fff;border-radius:12px;border:1px solid #dde2e8;overflow:hidden}
.sh{font-size:11px;font-weight:700;color:#1e5b92;text-transform:uppercase;letter-spacing:1px;padding:8px 20px;background:#f8f9fb;border-bottom:1px solid #dde2e8}
.spinner{width:32px;height:32px;border:3px solid #dde2e8;border-top-color:#1e5b92;border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>

function fD(i){if(!i)return"—";try{return new Date(i).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",timeZone:"America/New_York"})}catch{return i}}
function fT(i){if(!i)return"";try{return new Date(i).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"America/New_York"})}catch{return i}}
function fDT(i){return i?fD(i)+" at "+fT(i):"—"}
function fEW(i){if(!i)return"—";try{var d=new Date(i),h=d.getHours(),s=new Date(d),e=new Date(d);s.setMinutes(0,0,0);e.setMinutes(0,0,0);e.setHours(h+1);var f=function(t){return t.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"America/New_York"})};return f(s)+" – "+f(e)}catch{return i}}
function fPh(p){if(!p)return"";var c=p.replace(/\D/g,"");return c.length===10?"("+c.slice(0,3)+") "+c.slice(3,6)+"-"+c.slice(6):p}
function sL(c){return c==="90"?"Delivered":c==="45"?"Driver Arrived":c==="40"?"Out for Delivery":c==="50"?"Exception":"Scheduled"}
function sC(c){return c==="90"?B.green:c==="45"?B.blue:c==="40"?B.accent:c==="50"?B.red:B.g400}
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){if(k==="style"&&typeof attrs[k]==="object"){Object.assign(e.style,attrs[k])}else if(k==="className"){e.className=attrs[k]}else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),attrs[k])}else{e.setAttribute(k,attrs[k])}});
  if(children){if(typeof children==="string")e.innerHTML=children;else if(Array.isArray(children))children.forEach(function(c){if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c)})}
  return e;
}

var app=document.getElementById("app");
var proValue="";
var currentData=null;

function render(){
  app.innerHTML="";
  app.appendChild(renderHeader());
  app.appendChild(renderBody());
}

function renderHeader(){
  var wrap=el("div",{className:"np",style:{background:"linear-gradient(160deg,"+B.dark+","+B.blue+")",position:"relative"}});
  var dot=el("div",{style:{position:"absolute",inset:"0",opacity:".04",backgroundImage:"radial-gradient(circle,#fff 1px,transparent 1px)",backgroundSize:"28px 28px"}});
  wrap.appendChild(dot);
  var inner=el("div",{style:{maxWidth:"920px",margin:"0 auto",padding:"16px 20px 18px",position:"relative"}});
  
  // Logo centered - smaller
  var logoWrap=el("div",{style:{textAlign:"center",marginBottom:"10px"}});
  var logo=el("img",{className:"logo-h",src:LOGO,alt:"Davis Delivery Service",style:{height:"72px",objectFit:"contain"}});
  logoWrap.appendChild(logo);
  inner.appendChild(logoWrap);
  
  // Title - tighter
  inner.appendChild(el("h1",{style:{color:"#fff",fontSize:"18px",fontWeight:"700",fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:"-.3px",textAlign:"center",marginBottom:"10px"}},"Track Your Delivery"));
  
  // Search
  var searchWrap=el("div",{style:{display:"flex",maxWidth:"460px",margin:"0 auto"}});
  var input=el("input",{type:"text",placeholder:"Enter PRO #",style:{flex:"1",padding:"12px 16px",fontSize:"15px",border:"none",borderRadius:"10px 0 0 10px",background:"rgba(255,255,255,.95)",fontFamily:"inherit",fontWeight:"500"}});
  input.value=proValue;
  input.addEventListener("input",function(e){proValue=e.target.value});
  input.addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
  var btn=el("button",{onClick:doSearch,style:{padding:"12px 28px",background:B.accent,color:B.dark,border:"none",borderRadius:"0 10px 10px 0",cursor:"pointer",fontWeight:"800",fontSize:"14px",fontFamily:"'Plus Jakarta Sans',sans-serif"}},"TRACK");
  searchWrap.appendChild(input);
  searchWrap.appendChild(btn);
  inner.appendChild(searchWrap);
  
  // Phone
  var phone=el("div",{style:{textAlign:"center",marginTop:"8px"}});
  phone.appendChild(el("a",{href:"tel:6789263939",style:{color:"rgba(255,255,255,.55)",textDecoration:"none",fontSize:"12px",fontWeight:"600"}},"📞 (678) 926-3939"));
  inner.appendChild(phone);
  
  wrap.appendChild(inner);
  return wrap;
}

function renderBody(){
  var body=el("div",{style:{maxWidth:"920px",margin:"0 auto",padding:"16px 20px 40px"}});
  
  if(currentData==="loading"){
    body.appendChild(el("div",{style:{textAlign:"center",padding:"80px"}},'<div class="spinner"></div><div style="color:'+B.g400+';font-size:13px">Looking up your shipment...</div>'));
    return body;
  }
  if(currentData&&currentData.error){
    var err=el("div",{style:{background:"#fef5f5",border:"1px solid #f0c8c8",borderRadius:"12px",padding:"20px 24px",marginTop:"4px"}});
    err.innerHTML='<div style="font-weight:700;color:'+B.red+';font-size:15px;margin-bottom:4px">Shipment Not Found</div><div style="color:#6a3030;font-size:13px">No shipment found for PRO# '+currentData.error+'. Please verify your tracking number.</div><div style="margin-top:10px;font-size:13px">Need help? <a href="tel:6789263939" style="color:'+B.blue+';font-weight:700;text-decoration:none">(678) 926-3939</a></div>';
    body.appendChild(err);
    return body;
  }
  if(currentData&&currentData.stop){
    body.appendChild(renderResults(currentData));
    return body;
  }
  
  // Empty state
  var empty=el("div",{style:{textAlign:"center",padding:"50px 16px",color:B.g400}});
  empty.innerHTML='<div style="font-size:44px;margin-bottom:8px">📦</div><div style="font-size:15px;font-weight:600;color:'+B.g600+';margin-bottom:3px">Enter your PRO number above</div><div style="font-size:12px">Track your Davis Delivery shipment in real time</div>';
  body.appendChild(empty);
  return body;
}

function renderResults(d){
  var frag=document.createDocumentFragment();
  var s=d.stop,exe=d.exe,st=exe.stopStatus;
  var isDel=st==="90",isLive=st==="40",isExc=st==="50",isArr=st==="45";
  var addr=s.to.address,con=s.to.contact,docs=s.to.documents||[];
  var pod=docs.find(function(x){return x.documentType==="03"});
  var imgs=docs.filter(function(x){return x.documentType==="02"});
  var img=imgs[0]; // first photo for backward compatibility

  // Status card
  var statusCard=el("div",{className:"cd",style:{marginTop:"14px",borderLeft:"5px solid "+sC(st)}});
  var sc=el("div",{style:{padding:"14px 20px"}});
  var deliveredInline=isDel?'<div style="font-size:12px;color:'+B.g600+';margin-top:4px"><span style="color:'+B.green+';font-weight:700">Delivered</span> '+fDT(exe.to.confirmedDTTM)+'</div>':'';
  var topRow='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px"><div><div style="font-size:11px;color:'+B.g400+';font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">PRO# '+s.stopNbr+'</div><div style="font-size:20px;font-weight:800;color:'+B.dark+';font-family:\'Plus Jakarta Sans\',sans-serif;line-height:1.2">'+addr.name+'</div>'+deliveredInline+'</div><span style="display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;background:'+sC(st)+';color:#fff;font-weight:700;font-size:11px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap"><span style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.45)"></span>'+sL(st)+'</span></div>';
  
  var etaHtml="";
  if(isLive){
    etaHtml='<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap"><div style="background:'+B.blue+'0a;padding:10px 14px;border-radius:8px;border:1px solid '+B.blue+'18"><div style="font-size:9px;font-weight:700;color:'+B.blue+';text-transform:uppercase;letter-spacing:.5px">Estimated Arrival</div><div style="font-size:19px;font-weight:800;color:'+B.dark+';font-family:\'Plus Jakarta Sans\',sans-serif;line-height:1.2">'+fEW(exe.to.etaDttm)+'</div><div style="font-size:11px;color:'+B.g600+'">'+fD(exe.to.etaDttm)+'</div></div><div style="background:'+B.accent+'10;padding:10px 14px;border-radius:8px;border:1px solid '+B.accent+'25"><div style="font-size:9px;font-weight:700;color:'+B.orange+';text-transform:uppercase;letter-spacing:.5px">Driver Progress</div><div style="font-size:20px;font-weight:800;color:'+B.dark+';font-family:\'Plus Jakarta Sans\',sans-serif;line-height:1.2">'+(d.stopsAway>0?d.stopsAway+" stops away":"Next delivery")+'</div></div></div>';

async function submitReview(rating,comment,name,contact,proNumber){
  try{
    var res=await fetch(API_BASE+"/.netlify/functions/review",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({rating:rating,comment:comment,name:name,contact:contact,proNumber:proNumber})
    });
    var data=await res.json();
    return data;
  }catch(e){return{success:false,error:e.message}}
}

function renderReviewCard(proNumber){
  var card=el("div",{className:"cd np",style:{marginTop:"14px"}});
  var selectedRating=0;

    var starsHtml='<div id="stars-row" style="display:flex;gap:6px;justify-content:center;margin:10px 0 4px">';
    for(var i=1;i<=5;i++){
      starsHtml+='<span data-rating="'+i+'" style="font-size:32px;color:'+(i<=selectedRating?B.accent:"#dde2e8")+';cursor:pointer;transition:all .15s;user-select:none;line-height:1" class="star">★</span>';
    }

  function renderInitial(){

      });

          card.innerHTML='<div class="sh">Rate Your Delivery</div><div style="padding:30px 20px;text-align:center"><div style="font-size:48px;margin-bottom:12px">💙</div><div style="font-size:18px;font-weight:800;color:'+B.dark+';font-family:\'Plus Jakarta Sans\',sans-serif;margin-bottom:6px">Thank you for your feedback</div><div style="font-size:13px;color:'+B.g600+';max-width:320px;margin:0 auto">We\'ve received your feedback and our team will review it personally. Someone from Davis Delivery will reach out soon.</div></div>';
        }
      } else {
        btn.disabled=false;
        btn.textContent="Send Feedback";
        alert("Something went wrong. Please try again.");
      }
    });
  }
  
  renderInitial();
  return card;
}

async function doSearch(){
  if(!proValue.trim())return;
  currentData="loading";
  render();
  try{
    var res=await fetch(API_BASE+"/.netlify/functions/track?pro="+encodeURIComponent(proValue.trim()));
    var data=await res.json();
    if(data.error){currentData={error:proValue.trim()}}
    else{currentData=data}
  }catch(e){
    currentData={error:proValue.trim()};
  }
  render();
}

async function fetchDoc(guid,ext,company){
  try{
    var res=await fetch(API_BASE+"/.netlify/functions/doc?guid="+guid+"&ext="+ext+"&company="+(company||"ULINE"));
    if(!res.ok)throw new Error("fail");
    var data=await res.json();
    if(data.dataUri)return data.dataUri;
    throw new Error("no data");
  }catch(e){
    try{
      var res2=await fetch(API_BASE+"/.netlify/functions/doc?guid="+guid+"&ext="+ext+"&company=DAVIS");
      var data2=await res2.json();
      return data2.dataUri||null;
    }catch(e2){return null}
  }
}

// Convert data URI to blob for reliable mobile download
function dataUriToBlob(dataUri){
  var parts=dataUri.split(",");
  var mime=parts[0].match(/:(.*?);/)[1];
  var byteString=atob(parts[1]);
  var arrayBuffer=new ArrayBuffer(byteString.length);
  var intArray=new Uint8Array(arrayBuffer);
  for(var i=0;i<byteString.length;i++){intArray[i]=byteString.charCodeAt(i)}
  return new Blob([arrayBuffer],{type:mime});
}

async function downloadPOD(guid,ext,proNumber){
  var btn=event&&event.target;
  // Remember original button text so we can restore it correctly (POD vs Photo)
  var originalText=btn?btn.textContent:"↓ Download";
  var isPhoto=proNumber.indexOf("_photo")!==-1;
  var cleanPro=proNumber.replace("_photo","");
  var filename=isPhoto?("DeliveryPhoto_"+cleanPro+"."+ext):("POD_"+cleanPro+"."+ext);
  if(btn)btn.textContent="Downloading...";
  try{
    var dataUri=await fetchDoc(guid,ext);
    if(!dataUri){alert("Document not available. Please try again later.");if(btn)btn.textContent=originalText;return}
    var blob=dataUriToBlob(dataUri);
    var url=URL.createObjectURL(blob);
    var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
    if(isIOS){
      window.open(url,"_blank");
    }else{
      var a=document.createElement("a");
      a.href=url;
      a.download=filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    setTimeout(function(){URL.revokeObjectURL(url)},5000);
    if(btn)btn.textContent="✓ Downloaded";
    setTimeout(function(){if(btn)btn.textContent=originalText},2000);
  }catch(e){
    alert("Could not download document. Please try again.");
    if(btn)btn.textContent=originalText;
  }
}

async function sharePage(){
  var shareData={
    title:"Davis Delivery Tracking",
    text:"Track your Davis Delivery shipment",
    url:window.location.href
  };
  if(navigator.share&&navigator.canShare&&navigator.canShare(shareData)){
    try{await navigator.share(shareData);return}catch(e){if(e.name==="AbortError")return}
  }
  // Fallback: copy to clipboard
  try{
    await navigator.clipboard.writeText(window.location.href);
    var toast=document.createElement("div");
    toast.textContent="Link copied to clipboard";
    toast.style.cssText="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#0a2744;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2)";
    document.body.appendChild(toast);
    setTimeout(function(){toast.remove()},2500);
  }catch(e){
    // Last resort: show the URL in an alert
    prompt("Copy this link:",window.location.href);
  }
}

function printPage(){
  // On mobile Safari, window.print() works but can be flaky
  // Add a small delay and close any open overlays first
  setTimeout(function(){
    try{window.print()}catch(e){
      alert("Please use your browser menu to print this page.");
    }
  },100);
}

// Auto-load from URL parameter: /?pro=007100000
(function initFromUrl(){
  var params=new URLSearchParams(window.location.search);
  var urlPro=params.get("pro");
  if(urlPro&&urlPro.trim()){
    proValue=urlPro.trim();
    render();
    // Trigger search automatically
    doSearch();
  } else {
    render();
  }
})();
</script>
