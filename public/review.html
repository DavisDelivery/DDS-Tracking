function getParam(n){return new URLSearchParams(window.location.search).get(n)}
function fmtDT(iso){if(!iso)return"";try{var d=new Date(iso);return d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric",timeZone:"America/New_York"})+" at "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"America/New_York"})}catch{return iso}}

var pro=getParam("pro")||"";
var selectedRating=0;
var stopData=null;

async function loadDelivery(){
  if(!pro){renderNoPro();return}
  try{
    var res=await fetch("/.netlify/functions/track?pro="+encodeURIComponent(pro));
    if(!res.ok){renderNotFound();return}
    stopData=await res.json();
    if(stopData.error){renderNotFound();return}
    renderReview();
  }catch(e){renderNotFound()}
}

function renderNoPro(){
  document.getElementById("content").innerHTML=`
    <div style="text-align:center;padding:20px 20px 0"><img src="${LOGO}" alt="Davis Delivery" style="height:70px;filter:brightness(0) saturate(100%) invert(19%) sepia(67%) saturate(1373%) hue-rotate(193deg) brightness(93%) contrast(95%)"></div>
    <div style="background:#fff;border:1px solid ${B.g200};border-radius:12px;padding:40px 24px;margin-top:20px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">⭐</div>
      <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;color:${B.dark};margin-bottom:8px">Rate Your Delivery</h1>
      <p style="color:${B.g600};font-size:14px;margin-bottom:20px">Enter your PRO number to leave a review.</p>
      <input type="text" id="pro-input" placeholder="PRO #" style="max-width:240px;text-align:center" />
      <div style="margin-top:16px"><button class="btn-primary" onclick="goPro()">Continue</button></div>
    </div>
  `;
  document.getElementById("pro-input").addEventListener("keydown",function(e){if(e.key==="Enter")goPro()});
}

function goPro(){
  var val=document.getElementById("pro-input").value.trim();
  if(val)window.location.href="/review?pro="+encodeURIComponent(val);
}

function renderNotFound(){
  document.getElementById("content").innerHTML=`
    <div style="text-align:center;padding:20px 20px 0"><img src="${LOGO}" alt="Davis Delivery" style="height:70px;filter:brightness(0) saturate(100%) invert(19%) sepia(67%) saturate(1373%) hue-rotate(193deg) brightness(93%) contrast(95%)"></div>
    <div style="background:#fef5f5;border:1px solid #f0c8c8;border-radius:12px;padding:30px 24px;margin-top:20px;text-align:center">
      <div style="font-size:42px;margin-bottom:10px">🔍</div>
      <h2 style="color:${B.red};font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:6px">Shipment Not Found</h2>
      <p style="color:#6a3030;font-size:13px;margin-bottom:16px">We couldn't find a shipment for PRO# ${pro}.</p>
      <a href="/review" style="color:${B.blue};font-weight:600;text-decoration:none;font-size:13px">Try another PRO #</a>
    </div>
  `;
}

function renderReview(){
  var s=stopData.stop;
  var exe=stopData.exe;
  var addr=s.to.address;
  var deliveredTime=exe.to.confirmedDTTM;
  var isDelivered=exe.stopStatus==="90";
  
  document.getElementById("content").innerHTML=`
    <div style="text-align:center;padding:24px 20px 10px">
      <img src="${LOGO}" alt="Davis Delivery Service" style="height:70px;filter:brightness(0) saturate(100%) invert(19%) sepia(67%) saturate(1373%) hue-rotate(193deg) brightness(93%) contrast(95%)">
    </div>
    
    ${isDelivered?`
    <div style="background:linear-gradient(135deg,${B.dark},${B.blue});border-radius:12px;padding:24px;text-align:center;margin-bottom:16px;color:#fff">
      <div style="display:inline-flex;align-items:center;gap:8px;background:${B.green};padding:5px 14px;border-radius:20px;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">
        <span style="width:7px;height:7px;background:rgba(255,255,255,.6);border-radius:50%"></span> Delivered
      </div>
      <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px">${addr.name}</h1>
      <div style="color:rgba(255,255,255,.7);font-size:13px;margin-bottom:10px">${addr.city}, ${addr.state} ${addr.zip}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.5);border-top:1px solid rgba(255,255,255,.15);padding-top:10px;margin-top:10px">Delivered ${fmtDT(deliveredTime)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">PRO# ${s.stopNbr}</div>
    </div>
    ` : `
    <div style="background:#fff;border:1px solid ${B.g200};border-radius:12px;padding:20px;text-align:center;margin-bottom:16px">
      <div style="font-size:14px;color:${B.g600}">Shipment status: <strong>${exe.stopStatus==="40"?"Out for Delivery":"In Progress"}</strong></div>
      <div style="font-size:13px;color:${B.g400};margin-top:4px">Please wait until delivery is complete to leave a review.</div>
      <a href="/?pro=${pro}" style="display:inline-block;margin-top:12px;color:${B.blue};text-decoration:none;font-weight:600;font-size:13px">← Track instead</a>
    </div>
    `}
    
    ${isDelivered?`
    <div id="review-card" style="background:#fff;border:1px solid ${B.g200};border-radius:12px;padding:24px">
      <div style="text-align:center;margin-bottom:8px">
        <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;color:${B.dark};font-weight:800;margin-bottom:4px">How was your delivery?</h2>
        <div style="color:${B.g600};font-size:13px">Your feedback helps us improve.</div>
      </div>
      
      <div id="stars-row" style="display:flex;gap:4px;justify-content:center;margin:20px 0 12px">
        ${[1,2,3,4,5].map(n=>`<span class="star" data-rating="${n}" style="color:${B.g200}">★</span>`).join("")}
      </div>
      
      <div id="rating-label" style="text-align:center;font-size:13px;color:${B.g400};min-height:20px;font-weight:600"></div>
      
      <div id="review-form" style="display:none;margin-top:18px"></div>
    </div>
    ` : ""}
    
    <div style="text-align:center;margin-top:20px;padding:10px;font-size:11px;color:${B.g400}">
      © ${new Date().getFullYear()} Davis Delivery Service Inc. — <a href="/" style="color:${B.blue};text-decoration:none">Track Another Shipment</a>
    </div>
  `;
  
  if(!isDelivered)return;
  
  // Attach star handlers
  document.querySelectorAll(".star").forEach(function(star){
    star.addEventListener("click",function(){
      selectedRating=parseInt(star.dataset.rating);
      updateStars();
      showForm();
    });
    star.addEventListener("mouseenter",function(){
      var r=parseInt(star.dataset.rating);
      document.querySelectorAll(".star").forEach(function(s,i){
        s.style.color=(i+1<=r)?B.accent:B.g200;
      });
    });
  });
  document.getElementById("stars-row").addEventListener("mouseleave",updateStars);
}

function updateStars(){
  document.querySelectorAll(".star").forEach(function(s,i){
    s.style.color=(i+1<=selectedRating)?B.accent:B.g200;
  });
}

function showForm(){
  var label=document.getElementById("rating-label");
  var form=document.getElementById("review-form");
  var labels=["","Very Unhappy","Unhappy","Okay","Good","Excellent"];
  label.textContent=labels[selectedRating];
  label.style.color=B.g600;
  
  var isHigh=selectedRating>=4;
  form.style.display="block";
  form.innerHTML=`
    <div style="border-top:1px solid ${B.g100};padding-top:18px;margin-top:8px">
      <div style="background:${B.light};border:1px solid ${B.g200};border-radius:8px;padding:14px;margin-bottom:14px">
        <div style="font-size:14px;font-weight:700;color:${B.dark};margin-bottom:4px">Thank you for your feedback</div>
        <div style="font-size:12px;color:${B.g600}">Tell us more about your experience — we read every response.</div>
      </div>
      <textarea id="rv-comment" placeholder="Share your experience (optional)"></textarea>
      <div style="height:10px"></div>
      <input id="rv-name" type="text" placeholder="Your name (optional)">
      <div style="height:10px"></div>
      <input id="rv-contact" type="text" placeholder="Phone or email (optional)">
      <div style="height:14px"></div>
      <button id="rv-submit" class="btn-primary" style="width:100%;background:${B.blue}">Send Feedback</button>
    </div>
  `;
  
  document.getElementById("rv-submit").addEventListener("click",async function(){
    var btn=this;
    btn.disabled=true;
    btn.textContent="Submitting...";
    var comment=document.getElementById("rv-comment").value;
    var name=document.getElementById("rv-name").value;
    var contactEl=document.getElementById("rv-contact");
    var contact=contactEl?contactEl.value:"";
    try{
      var res=await fetch("/.netlify/functions/review",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({rating:selectedRating,comment:comment,name:name,contact:contact,proNumber:pro})
      });
      var result=await res.json();
      if(result.success){
        renderThankYou(result,comment);
      } else {
        throw new Error("submit failed");
      }
    }catch(e){
      btn.disabled=false;
      btn.textContent="Send Feedback";
      alert("Something went wrong. Please try again.");
    }
  });
}

function renderThankYou(result,commentText){
  var card=document.getElementById("review-card");
  if(result.routedTo==="google"&&result.googleUrl){
    // Copy comment to clipboard if there is one
    var hasComment=commentText&&commentText.trim().length>0;
    var copyPromise=hasComment&&navigator.clipboard?navigator.clipboard.writeText(commentText.trim()).catch(function(){return false}):Promise.resolve(true);
    
    card.innerHTML=`
      <div style="text-align:center;padding:24px 20px 20px">
        <div style="font-size:52px;margin-bottom:12px">🎉</div>
        <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;color:${B.dark};font-weight:800;margin-bottom:6px">Thank you!</h2>
        <p style="color:${B.g600};font-size:14px;margin-bottom:16px;max-width:360px;margin-left:auto;margin-right:auto">Your feedback means the world to our family-owned business.</p>
        ${hasComment?`
          <div style="background:${B.accent}15;border:1px solid ${B.accent}40;border-radius:8px;padding:14px;margin:0 auto 18px;max-width:400px;text-align:left">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:18px">📋</span>
              <strong style="font-size:13px;color:${B.dark}">Your comment has been copied</strong>
            </div>
            <div style="font-size:12px;color:${B.g600};line-height:1.5">We've copied your text to your clipboard. On the next page, <strong>tap and hold the review box, then tap "Paste"</strong> to save time.</div>
          </div>
        `:''}
        <a href="${result.googleUrl}" target="_blank" rel="noopener noreferrer" onclick="this.textContent='Opening Google...'" class="btn-primary" style="display:inline-block;text-decoration:none;background:${B.blue};padding:14px 32px">${hasComment?'Open Google to Paste &amp; Post':'Open Google Review'}</a>
        <div style="margin-top:14px;font-size:11px;color:${B.g400}">Opens in a new tab</div>
      </div>
    `;
    // Wait for clipboard copy to finish, then auto-open Google after short delay
    copyPromise.then(function(){
      setTimeout(function(){window.open(result.googleUrl,"_blank","noopener,noreferrer")},1800);
    });
  } else {
    card.innerHTML=`
      <div style="text-align:center;padding:20px 20px 10px">
        <div style="font-size:52px;margin-bottom:12px">💙</div>
        <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;color:${B.dark};font-weight:800;margin-bottom:6px">Thank you for your feedback</h2>
        <p style="color:${B.g600};font-size:14px;max-width:380px;margin:0 auto">We've received your feedback and our team will review it personally. Someone from Davis Delivery will reach out soon to make this right.</p>
      </div>
    `;
  }
}

loadDelivery();
</script>
</body>
</html>
